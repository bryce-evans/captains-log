name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Typecheck, Lint, Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (warnings allowed)
        # Lint is not yet a hard gate. Continue on failure but log it so
        # contributors can see what the linter would have flagged. Promote
        # to a hard failure once the codebase is clean.
        run: npm run lint || echo "::warning::ESLint reported issues — see log above"

      - name: Test
        run: npm test -- --ci
